<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>VD 测试设备扫码借还系统</title>
  <!-- 引入 Tailwind CSS 美化 UI -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 引入 Supabase 官方 JS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- 引入 H5 扫码库 -->
  <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col">

  <!-- 顶部导航栏 -->
  <header class="bg-blue-600 text-white shadow-md py-4 px-4 sticky top-0 z-50">
    <div class="max-w-md mx-auto flex justify-between items-center">
      <h1 class="text-lg font-bold tracking-wider flex items-center gap-2" onclick="goHome()">
        <span>🚙</span> VD 设备借还系统
      </h1>
      <button onclick="goHome()" class="text-sm bg-blue-700 hover:bg-blue-800 px-3 py-1.5 rounded-lg transition">首页</button>
    </div>
  </header>

  <!-- 主体内容容器 -->
  <main class="flex-grow max-w-md w-full mx-auto p-4 pb-12">

    <!-- ================= 页面 1：首页 (Home) ================= -->
    <div id="view-home" class="space-y-6">
      <!-- 快捷操作区 -->
      <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100 text-center space-y-4">
        <h2 class="text-xl font-bold text-slate-700">设备借还快捷操作</h2>
        <p class="text-sm text-slate-400">请选择以下方式定位设备进行借还</p>
        
        <!-- 扫码按钮 -->
        <button onclick="startScanner()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3.5 px-4 rounded-xl shadow-md shadow-blue-100 flex items-center justify-center gap-2 transition active:scale-95">
          📷 开启相机扫码
        </button>

        <div class="relative flex py-2 items-center text-slate-300">
          <div class="flex-grow border-t border-slate-200"></div>
          <span class="flex-shrink mx-4 text-xs text-slate-400 font-medium">或者手动输入</span>
          <div class="flex-grow border-t border-slate-200"></div>
        </div>

        <!-- 手动输入 -->
        <div class="flex gap-2">
          <input type="text" id="manual-id-input" placeholder="输入设备ID (如: VD-GJ-031-01)" class="flex-grow border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
          <button onclick="searchManualId()" class="bg-slate-800 hover:bg-slate-900 text-white px-5 py-3 rounded-xl font-medium text-sm transition active:scale-95">查询</button>
        </div>
      </div>

      <!-- 最近借还动态 -->
      <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100 space-y-4">
        <h3 class="text-md font-bold text-slate-700 flex items-center gap-1.5">
          <span>📋</span> 最近借还动态
        </h3>
        <div id="recent-logs" class="space-y-3 text-sm">
          <p class="text-slate-400 text-center py-4">正在加载动态...</p>
        </div>
      </div>
    </div>

    <!-- ================= 页面 2：扫码器 (Scanner) ================= -->
    <div id="view-scanner" class="hidden space-y-4">
      <div class="bg-white rounded-2xl p-4 shadow-sm border border-slate-100 overflow-hidden">
        <div class="flex justify-between items-center mb-4">
          <h3 class="font-bold text-slate-700">对准设备二维码</h3>
          <button onclick="stopScanner()" class="text-sm text-rose-500 font-medium px-2 py-1">取消</button>
        </div>
        <div id="interactive-scanner" class="w-full bg-black rounded-xl overflow-hidden aspect-square"></div>
      </div>
    </div>

    <!-- ================= 页面 3：设备详情及借还操作 (Detail) ================= -->
    <div id="view-detail" class="hidden space-y-6">
      <!-- 加载中占位 -->
      <div id="detail-loading" class="text-center py-12 space-y-3">
        <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600 mx-auto"></div>
        <p class="text-slate-400 text-sm">正在检索设备信息...</p>
      </div>

      <!-- 设备信息卡片 -->
      <div id="detail-content" class="hidden space-y-6">
        <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100 space-y-4 relative overflow-hidden">
          <!-- 状态标签 -->
          <div id="device-status-badge" class="absolute top-4 right-4 px-3 py-1 rounded-full text-xs font-bold">
            状态
          </div>

          <div class="space-y-1">
            <span id="device-category" class="text-xs font-semibold text-blue-600 tracking-wider uppercase">分类</span>
            <h2 id="device-name" class="text-xl font-black text-slate-800">设备名称</h2>
            <p id="device-id-tag" class="text-xs font-mono text-slate-400">ID: </p>
          </div>

          <div class="grid grid-cols-2 gap-4 pt-2 text-sm border-t border-slate-50">
            <div>
              <p class="text-slate-400 text-xs">型号</p>
              <p id="device-model" class="font-semibold text-slate-700">-</p>
            </div>
            <div>
              <p class="text-slate-400 text-xs">序列号 (SN)</p>
              <p id="device-sn" class="font-semibold text-slate-700">-</p>
            </div>
            <div>
              <p class="text-slate-400 text-xs">常驻保管人</p>
              <p id="device-owner" class="font-semibold text-slate-700">-</p>
            </div>
            <div>
              <p class="text-slate-400 text-xs">存放位置</p>
              <p id="device-location" class="font-semibold text-slate-700">-</p>
            </div>
          </div>

          <div id="device-notes-box" class="p-3 bg-amber-50 rounded-xl text-xs text-amber-700 hidden">
            <strong>备注提示：</strong> <span id="device-notes"></span>
          </div>

          <!-- 新增：生成标签按钮 -->
          <div class="pt-2 border-t border-slate-50">
            <button onclick="toggleLabelGenerator()" class="w-full py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-xl text-xs font-bold flex items-center justify-center gap-1 transition">
              🏷️ 生成/打印该设备二维码贴纸
            </button>
          </div>
        </div>

        <!-- 新增：标签贴纸预览区域 -->
        <div id="label-generator-box" class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100 space-y-4 hidden">
          <div class="flex justify-between items-center">
            <h3 class="text-sm font-bold text-slate-700">设备贴纸预览 (可直接截图或打印)</h3>
            <button onclick="toggleLabelGenerator()" class="text-xs text-slate-400">收起</button>
          </div>
          
          <!-- 贴纸实体 (精心设计，适合打印成 70mm * 50mm 左右的标签纸) -->
          <div class="border-2 border-dashed border-slate-300 p-4 rounded-xl bg-white flex gap-4 items-center max-w-sm mx-auto shadow-inner">
            <!-- 二维码 -->
            <div class="flex-shrink-0 bg-white p-1 border border-slate-100 rounded-lg">
              <img id="label-qr-image" src="" alt="设备二维码" class="w-24 h-24">
            </div>
            <!-- 文字信息 -->
            <div class="flex-grow space-y-1 text-xs">
              <p class="font-black text-sm text-slate-900 leading-tight" id="label-device-name">设备名称</p>
              <p class="font-mono font-bold text-blue-600" id="label-device-id">ID: -</p>
              <div class="text-[10px] text-slate-500 space-y-0.5 border-t border-slate-100 pt-1">
                <p>保管人: <span class="font-semibold text-slate-700" id="label-device-owner">-</span></p>
                <p>位置: <span class="font-semibold text-slate-700" id="label-device-location">-</span></p>
              </div>
              <p class="text-[8px] text-slate-400 pt-1 border-t border-slate-50 text-center">微信扫码一键借还</p>
            </div>
          </div>
        </div>

        <!-- 借用表单 (未借出时显示) -->
        <div id="action-borrow" class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100 space-y-4 hidden">
          <h3 class="text-lg font-bold text-slate-700">登记借用信息</h3>
          <div class="space-y-3">
            <div>
              <label class="block text-xs font-bold text-slate-500 mb-1">借用人姓名 <span class="text-rose-500">*</span></label>
              <input type="text" id="borrower-name" placeholder="请输入你的名字" class="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-blue-500">
            </div>
            <div>
              <label class="block text-xs font-bold text-slate-500 mb-1">预计归还日期</label>
              <input type="date" id="expected-return-date" class="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-blue-500">
            </div>
            <button onclick="submitBorrow()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3.5 rounded-xl shadow-md transition active:scale-95">
              ✍️ 确认借出
            </button>
          </div>
        </div>

        <!-- 归还表单 (已借出时显示) -->
        <div id="action-return" class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100 space-y-4 hidden">
          <h3 class="text-lg font-bold text-slate-700">当前借用状态</h3>
          <div class="p-4 bg-slate-50 rounded-xl space-y-2 text-sm">
            <div class="flex justify-between">
              <span class="text-slate-400">当前借用人：</span>
              <span id="current-borrower-name" class="font-bold text-slate-700">-</span>
            </div>
            <div class="flex justify-between">
              <span class="text-slate-400">借出时间：</span>
              <span id="borrow-time-tag" class="font-semibold text-slate-700">-</span>
            </div>
            <div class="flex justify-between">
              <span class="text-slate-400">预计归还：</span>
              <span id="expected-return-tag" class="font-semibold text-rose-600">-</span>
            </div>
          </div>
          <button onclick="submitReturn()" class="w-full bg-rose-600 hover:bg-rose-700 text-white font-semibold py-3.5 rounded-xl shadow-md transition active:scale-95">
            🔄 确认归还并入库
          </button>
        </div>
      </div>
    </div>

  </main>

  <!-- ================= 核心 JavaScript 逻辑 ================= -->
  <script>
    // 1. 填入你的 Supabase 配置
    let SUPABASE_URL = "https://sslqnzfezflbtccwstkd.supabase.co/rest/v1/";
    const SUPABASE_KEY = "sb_publishable_HoPbeml9qwno-0k0EgBBEQ_epNishVC";

    if (SUPABASE_URL.endsWith('/rest/v1/')) {
      SUPABASE_URL = SUPABASE_URL.replace('/rest/v1/', '');
    } else if (SUPABASE_URL.endsWith('/rest/v1')) {
      SUPABASE_URL = SUPABASE_URL.replace('/rest/v1', '');
    }

    let supabaseClient = null;
    let currentDevice = null;
    let html5QrScanner = null;

    try {
      if (!window.supabase) {
        alert("🚨 依赖库加载失败！");
      } else {
        supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      }
    } catch (e) {
      alert("初始化 Supabase 客户端出错: " + e.message);
    }

    // 2. 页面加载
    window.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const deviceId = urlParams.get('id');
      
      if (deviceId) {
        showDetail(deviceId);
      } else {
        goHome();
      }
    });

    // 3. 回到首页
    function goHome() {
      window.history.replaceState({}, document.title, window.location.pathname);
      document.getElementById('view-home').classList.remove('hidden');
      document.getElementById('view-scanner').classList.add('hidden');
      document.getElementById('view-detail').classList.add('hidden');
      stopScanner();
      loadRecentLogs();
    }

    // 4. 展示详情页
    async function showDetail(deviceId) {
      if (!supabaseClient) {
        alert("数据库未连接！");
        return;
      }

      document.getElementById('view-home').classList.add('hidden');
      document.getElementById('view-scanner').classList.add('hidden');
      document.getElementById('view-detail').classList.remove('hidden');
      
      document.getElementById('detail-loading').classList.remove('hidden');
      document.getElementById('detail-content').classList.add('hidden');
      document.getElementById('label-generator-box').classList.add('hidden'); // 默认隐藏标签生成器
      
      stopScanner();
      
      try {
        const { data, error } = await supabaseClient
          .from('devices')
          .select('*')
          .eq('device_id', deviceId)
          .single();
          
        if (error) throw new Error(error.message);
        if (!data) throw new Error("数据库中未找到该设备。");
        
        currentDevice = data;
        renderDeviceDetail();
      } catch (err) {
        alert("❌ 查询设备失败！\n\n具体错误信息：\n" + err.message);
        goHome();
      }
    }

    // 5. 渲染设备详情
    function renderDeviceDetail() {
      document.getElementById('detail-loading').classList.add('hidden');
      document.getElementById('detail-content').classList.remove('hidden');

      document.getElementById('device-id-tag').innerText = "ID: " + currentDevice.device_id;
      document.getElementById('device-category').innerText = currentDevice.category;
      document.getElementById('device-name').innerText = currentDevice.name;
      document.getElementById('device-model').innerText = currentDevice.model || "暂无";
      document.getElementById('device-sn').innerText = currentDevice.sn || "暂无";
      document.getElementById('device-owner').innerText = currentDevice.owner || "暂无";
      document.getElementById('device-location').innerText = currentDevice.location || "暂无";

      if (currentDevice.notes) {
        document.getElementById('device-notes-box').classList.remove('hidden');
        document.getElementById('device-notes').innerText = currentDevice.notes;
      } else {
        document.getElementById('device-notes-box').classList.add('hidden');
      }

      const statusBadge = document.getElementById('device-status-badge');
      const borrowForm = document.getElementById('action-borrow');
      const returnForm = document.getElementById('action-return');

      if (currentDevice.current_borrower) {
        statusBadge.innerText = "已借出";
        statusBadge.className = "absolute top-4 right-4 px-3 py-1 rounded-full text-xs font-bold bg-rose-100 text-rose-700";
        borrowForm.classList.add('hidden');
        returnForm.classList.remove('hidden');

        document.getElementById('current-borrower-name').innerText = currentDevice.current_borrower;
        document.getElementById('borrow-time-tag').innerText = new Date(currentDevice.borrow_time).toLocaleString('zh-CN');
        document.getElementById('expected-return-tag').innerText = currentDevice.expected_return_date ? currentDevice.expected_return_date : "未设置";
      } else {
        statusBadge.innerText = "库房中";
        statusBadge.className = "absolute top-4 right-4 px-3 py-1 rounded-full text-xs font-bold bg-emerald-100 text-emerald-700";
        borrowForm.classList.remove('hidden');
        returnForm.classList.add('hidden');
        
        document.getElementById('borrower-name').value = "";
        document.getElementById('expected-return-date').value = "";
      }
    }

    // 🌟 新增：切换显示二维码贴纸生成器
    function toggleLabelGenerator() {
      const box = document.getElementById('label-generator-box');
      if (box.classList.contains('hidden')) {
        // 渲染贴纸内容
        document.getElementById('label-device-name').innerText = currentDevice.name;
        document.getElementById('label-device-id').innerText = "ID: " + currentDevice.device_id;
        document.getElementById('label-device-owner').innerText = currentDevice.owner || "暂无";
        document.getElementById('label-device-location').innerText = currentDevice.location || "暂无";
        
        // 动态生成二维码图片（指向你当前的 GitHub Pages 链接）
        const targetUrl = `https://sanshu56.github.io/VD-test-devices/?id=${currentDevice.device_id}`;
        const qrApiUrl = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(targetUrl)}`;
        document.getElementById('label-qr-image').src = qrApiUrl;

        box.classList.remove('hidden');
        // 滚动到贴纸视图
        box.scrollIntoView({ behavior: 'smooth' });
      } else {
        box.classList.add('hidden');
      }
    }

    // 6. 提交借出登记
    async function submitBorrow() {
      const borrowerName = document.getElementById('borrower-name').value.trim();
      const expectedReturnDate = document.getElementById('expected-return-date').value;

      if (!borrowerName) {
        alert("请输入借用人姓名！");
        return;
      }

      const borrowTime = new Date().toISOString();

      try {
        const { error: devError } = await supabaseClient
          .from('devices')
          .update({
            current_borrower: borrowerName,
            borrow_time: borrowTime,
            expected_return_date: expectedReturnDate || null
          })
          .eq('device_id', currentDevice.device_id);

        if (devError) throw devError;

        await supabaseClient
          .from('borrow_logs')
          .insert({
            device_id: currentDevice.device_id,
            borrower_name: borrowerName,
            action_type: 'borrow',
            expected_return_date: expectedReturnDate || null,
            notes: currentDevice.notes
          });

        alert(`登记成功！设备已成功登记借用给：${borrowerName}`);
        showDetail(currentDevice.device_id);
      } catch (err) {
        alert("登记失败: " + err.message);
      }
    }

    // 7. 提交归还登记
    async function submitReturn() {
      const formerBorrower = currentDevice.current_borrower;

      try {
        const { error: devError } = await supabaseClient
          .from('devices')
          .update({
            current_borrower: null,
            borrow_time: null,
            expected_return_date: null
          })
          .eq('device_id', currentDevice.device_id);

        if (devError) throw devError;

        await supabaseClient
          .from('borrow_logs')
          .insert({
            device_id: currentDevice.device_id,
            borrower_name: formerBorrower,
            action_type: 'return'
          });

        alert("归还登记成功！设备已安全入库。");
        showDetail(currentDevice.device_id);
      } catch (err) {
        alert("归还失败: " + err.message);
      }
    }

    // 8. 加载最近 5 条日志
    async function loadRecentLogs() {
      const container = document.getElementById('recent-logs');
      if (!supabaseClient) return;
      
      try {
        const { data, error } = await supabaseClient
          .from('borrow_logs')
          .select('*, devices(name)')
          .order('action_time', { ascending: false })
          .limit(5);

        if (error) throw error;

        if (!data || data.length === 0) {
          container.innerHTML = `<p class="text-slate-400 text-center py-4">暂无借还记录</p>`;
          return;
        }

        container.innerHTML = data.map(log => {
          const timeStr = new Date(log.action_time).toLocaleDateString('zh-CN') + ' ' + new Date(log.action_time).toLocaleTimeString('zh-CN', {hour: '2-digit', minute:'2-digit'});
          const isBorrow = log.action_type === 'borrow';
          const badgeColor = isBorrow ? 'bg-emerald-50 text-emerald-700 border-emerald-100' : 'bg-blue-50 text-blue-700 border-blue-100';
          const actionText = isBorrow ? '借出' : '归还';
          const deviceName = log.devices ? log.devices.name : log.device_id;

          return `
            <div class="flex items-start justify-between p-3 bg-slate-50 rounded-xl border border-slate-100">
              <div class="space-y-1">
                <p class="font-bold text-slate-700">${deviceName}</p>
                <p class="text-xs text-slate-400">${timeStr} · ID: ${log.device_id}</p>
              </div>
              <div class="flex flex-col items-end gap-1.5">
                <span class="px-2 py-0.5 text-xs font-bold border rounded-full ${badgeColor}">${log.borrower_name} ${actionText}</span>
              </div>
            </div>
          `;
        }).join('');
      } catch (err) {
        container.innerHTML = `<p class="text-rose-500 text-center py-2">加载动态失败: ${err.message}</p>`;
      }
    }

    // 9. 开启摄像头扫码
    function startScanner() {
      document.getElementById('view-home').classList.add('hidden');
      document.getElementById('view-scanner').classList.remove('hidden');

      html5QrScanner = new Html5Qrcode("interactive-scanner");
      
      const config = { 
        fps: 10, 
        qrbox: (width, height) => {
          const size = Math.min(width, height) * 0.7;
          return { width: size, height: size };
        }
      };

      html5QrScanner.start(
        { facingMode: "environment" },
        config,
        (decodedText) => {
          try {
            if (decodedText.startsWith('http')) {
              const url = new URL(decodedText);
              const id = url.searchParams.get('id');
              if (id) {
                showDetail(id);
                return;
              }
            }
          } catch(e) {}
          showDetail(decodedText.trim());
        },
        (errorMessage) => {}
      ).catch(err => {
        alert("无法开启摄像头，请确认是否授予网页相机权限！");
        goHome();
      });
    }

    // 10. 关闭摄像头
    function stopScanner() {
      if (html5QrScanner) {
        html5QrScanner.stop().then(() => {
          html5QrScanner = null;
        }).catch(err => console.error("停止扫码失败", err));
      }
    }

    // 11. 手动查询 ID
    function searchManualId() {
      const id = document.getElementById('manual-id-input').value.trim();
      if (!id) {
        alert("请输入设备 ID！");
        return;
      }
      showDetail(id);
    }
  </script>
</body>
</html>
