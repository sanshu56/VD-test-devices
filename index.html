<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>VD 测试设备扫码借还系统</title>
  <!-- 引入 Tailwind CSS 美化 UI -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 引入 Supabase 官方 JS SDK (国内高速镜像) -->
  <script src="https://npm.elemecdn.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <!-- 引入 H5 扫码库 -->
  <script src="https://cdn.bootcdn.net/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  <!-- 引入纯 JS 本地二维码生成库 -->
  <script src="https://cdn.bootcdn.net/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col">

  <!-- 顶部导航栏 -->
  <header class="bg-blue-600 text-white shadow-md py-4 px-4 sticky top-0 z-50">
    <div class="max-w-md mx-auto flex justify-between items-center">
      <h1 class="text-lg font-bold tracking-wider flex items-center gap-2" onclick="goHome()">
        <span>🚙</span> VD 设备借还系统
      </h1>
      <div class="flex gap-2">
        <button onclick="openAdminPanel()" class="text-xs bg-blue-700 hover:bg-blue-800 px-2.5 py-1.5 rounded-lg transition">管理员面板</button>
        <button onclick="goHome()" class="text-xs bg-blue-500 hover:bg-blue-700 px-2.5 py-1.5 rounded-lg transition">首页</button>
      </div>
    </div>
  </header>

  <!-- 主体内容容器 -->
  <main class="flex-grow max-w-md w-full mx-auto p-4 pb-12">

    <!-- ================= 页面 1：首页 (Home) ================= -->
    <div id="view-home" class="space-y-6">
      <!-- 快捷操作区 -->
      <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100 text-center space-y-4">
        <h2 class="text-xl font-bold text-slate-700">设备借还快捷操作</h2>
        <p class="text-sm text-slate-400">请选择以下方式定位设备进行借还</p>
        
        <!-- 扫码按钮 -->
        <button onclick="startScanner()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3.5 px-4 rounded-xl shadow-md shadow-blue-100 flex items-center justify-center gap-2 transition active:scale-95">
          📷 开启相机扫码
        </button>

        <div class="relative flex py-2 items-center text-slate-300">
          <div class="flex-grow border-t border-slate-200"></div>
          <span class="flex-shrink mx-4 text-xs text-slate-400 font-medium">或者手动输入</span>
          <div class="flex-grow border-t border-slate-200"></div>
        </div>

        <!-- 手动输入 -->
        <div class="flex gap-2">
          <input type="text" id="manual-id-input" placeholder="输入设备ID (如: VD-GJ-031-01)" class="flex-grow border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-blue-500">
          <button onclick="searchManualId()" class="bg-slate-800 hover:bg-slate-900 text-white px-5 py-3 rounded-xl font-medium text-sm transition active:scale-95">查询</button>
        </div>
      </div>

      <!-- 数据库真实设备快捷测试通道 -->
      <div id="test-devices-section" class="bg-amber-50 rounded-2xl p-6 shadow-sm border border-amber-100 space-y-4 hidden">
        <h3 class="text-md font-bold text-amber-800 flex items-center gap-1.5">
          <span>💡</span> 数据库内真实设备 (快捷测试)
        </h3>
        <div id="test-devices-list" class="flex flex-wrap gap-2 pt-1"></div>
      </div>

      <!-- 最近借还动态 -->
      <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100 space-y-4">
        <h3 class="text-md font-bold text-slate-700 flex items-center gap-1.5">
          <span>📋</span> 最近借还动态
        </h3>
        <div id="recent-logs" class="space-y-3 text-sm">
          <p class="text-slate-400 text-center py-4">正在加载动态...</p>
        </div>
      </div>
    </div>

    <!-- ================= 页面 2：扫码器 (Scanner) ================= -->
    <div id="view-scanner" class="hidden space-y-4">
      <div class="bg-white rounded-2xl p-4 shadow-sm border border-slate-100 overflow-hidden">
        <div class="flex justify-between items-center mb-4">
          <h3 class="font-bold text-slate-700">对准设备二维码</h3>
          <button onclick="stopScanner()" class="text-sm text-rose-500 font-medium px-2 py-1">取消</button>
        </div>
        <div id="interactive-scanner" class="w-full bg-black rounded-xl overflow-hidden aspect-square"></div>
      </div>
    </div>

    <!-- ================= 页面 3：设备详情及借还操作 (Detail) ================= -->
    <div id="view-detail" class="hidden space-y-6">
      <!-- 加载中占位 -->
      <div id="detail-loading" class="text-center py-12 space-y-3">
        <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600 mx-auto"></div>
        <p class="text-slate-400 text-sm">正在检索设备信息...</p>
      </div>

      <!-- 网页端错误提示卡片 -->
      <div id="detail-error" class="hidden bg-white rounded-2xl p-8 shadow-sm border border-rose-100 text-center space-y-4">
        <div class="text-rose-500 text-5xl">❌</div>
        <h3 class="text-lg font-bold text-slate-700">查询设备失败</h3>
        <p id="detail-error-msg" class="text-sm text-slate-500 whitespace-pre-wrap">具体错误原因</p>
        <button onclick="goHome()" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-semibold py-3 rounded-xl transition">
          返回首页
        </button>
      </div>

      <!-- 设备信息卡片 -->
      <div id="detail-content" class="hidden space-y-6">
        <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100 space-y-4 relative overflow-hidden">
          <!-- 状态标签 -->
          <div id="device-status-badge" class="absolute top-4 right-4 px-3 py-1 rounded-full text-xs font-bold">
            状态
          </div>

          <div class="space-y-1">
            <span id="device-category" class="text-xs font-semibold text-blue-600 tracking-wider uppercase">分类</span>
            <h2 id="device-name" class="text-xl font-black text-slate-800">设备名称</h2>
            <p id="device-id-tag" class="text-xs font-mono text-slate-400">ID: </p>
          </div>

          <div class="grid grid-cols-2 gap-4 pt-2 text-sm border-t border-slate-50">
            <div>
              <p class="text-slate-400 text-xs">型号</p>
              <p id="device-model" class="font-semibold text-slate-700">-</p>
            </div>
            <div>
              <p class="text-slate-400 text-xs">序列号 (SN)</p>
              <p id="device-sn" class="font-semibold text-slate-700">-</p>
            </div>
            <div>
              <p class="text-slate-400 text-xs">专属管理员</p>
              <p id="device-owner" class="font-semibold text-slate-700">-</p>
            </div>
            <div>
              <p class="text-slate-400 text-xs">存放位置</p>
              <p id="device-location" class="font-semibold text-slate-700">-</p>
            </div>
          </div>
        </div>

        <!-- 借用表单 (未借出时显示) -->
        <div id="action-borrow" class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100 space-y-4 hidden">
          <h3 class="text-lg font-bold text-slate-700">登记借用信息</h3>
          <div class="space-y-3">
            <div>
              <label class="block text-xs font-bold text-slate-500 mb-1">你的姓名 <span class="text-rose-500">*</span></label>
              <input type="text" id="borrower-name" placeholder="请输入你的真实姓名" class="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-blue-500">
            </div>
            <div>
              <label class="block text-xs font-bold text-slate-500 mb-1">预计归还日期</label>
              <input type="date" id="expected-return-date" class="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-blue-500">
            </div>
            <button onclick="submitBorrow()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3.5 rounded-xl shadow-md transition active:scale-95">
              ✍️ 确认借出
            </button>
          </div>
        </div>

        <!-- 归还申请表单 (已借出、未申请归还时显示) -->
        <div id="action-return-request" class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100 space-y-4 hidden">
          <h3 class="text-lg font-bold text-slate-700">当前借用状态</h3>
          <div class="p-4 bg-slate-50 rounded-xl space-y-2 text-sm">
            <div class="flex justify-between">
              <span class="text-slate-400">当前借用人：</span>
              <span id="current-borrower-name" class="font-bold text-slate-700">-</span>
            </div>
            <div class="flex justify-between">
              <span class="text-slate-400">借出时间：</span>
              <span id="borrow-time-tag" class="font-semibold text-slate-700">-</span>
            </div>
          </div>
          <button onclick="submitReturnRequest()" class="w-full bg-amber-500 hover:bg-amber-600 text-white font-semibold py-3.5 rounded-xl shadow-md transition active:scale-95">
            🔄 申请归还 (将微信通知管理员确认)
          </button>
        </div>

        <!-- 待确认归还状态 (已申请归还，等待管理员确认) -->
        <div id="action-pending-confirm" class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100 text-center py-6 space-y-3 hidden">
          <div class="text-amber-500 text-4xl animate-bounce">⏳</div>
          <h3 class="text-lg font-bold text-slate-700">已提交归还申请</h3>
          <p class="text-xs text-slate-400">
            系统已向管理员 <strong id="pending-owner-name" class="text-slate-700">-</strong> 发送确认通知，请等待管理员确认入库。
          </p>
        </div>
      </div>
    </div>

    <!-- ================= 页面 4：管理员审批面板 (Admin Panel) ================= -->
    <div id="view-admin" class="hidden space-y-6">
      <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100 space-y-4">
        <div class="flex justify-between items-center">
          <h2 class="text-xl font-bold text-slate-700">管理员审批面板</h2>
          <button onclick="exitAdminPanel()" class="text-xs text-rose-500 font-bold">退出</button>
        </div>
        
        <!-- 管理员身份定位 -->
        <div class="flex gap-2">
          <input type="text" id="admin-name-input" placeholder="输入你的管理员姓名 (如: 张三)" class="flex-grow border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none">
          <button onclick="loadAdminRequests()" class="bg-slate-800 text-white text-xs px-4 py-2.5 rounded-xl font-bold">查询我的待办</button>
        </div>
      </div>

      <!-- 待办审批列表 -->
      <div class="space-y-4">
        <h3 class="text-sm font-bold text-slate-400 px-1">📥 等待我确认归还的设备</h3>
        <div id="admin-request-list" class="space-y-3">
          <p class="text-slate-400 text-center py-8 text-sm bg-white rounded-2xl border border-slate-100">请输入名字并点击查询</p>
        </div>
      </div>
    </div>

  </main>

  <!-- ================= 核心 JavaScript 逻辑 ================= -->
  <script>
    // 1. 填入你的 Supabase 配置
    let SUPABASE_URL = "https://sslqnzfezflbtccwstkd.supabase.co/rest/v1/";
    const SUPABASE_KEY = "sb_publishable_HoPbeml9qwno-0k0EgBBEQ_epNishVC";

    if (SUPABASE_URL.endsWith('/rest/v1/')) {
      SUPABASE_URL = SUPABASE_URL.replace('/rest/v1/', '');
    } else if (SUPABASE_URL.endsWith('/rest/v1')) {
      SUPABASE_URL = SUPABASE_URL.replace('/rest/v1', '');
    }

    let supabaseClient = null;
    let currentDevice = null;
    let html5QrScanner = null;

    try {
      if (!window.supabase) {
        alert("🚨 依赖库加载失败！请检查手机网络。");
      } else {
        supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      }
    } catch (e) {
      console.error("初始化 Supabase 客户端出错: ", e);
    }

    // 2. 页面生命周期
    window.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const deviceId = urlParams.get('id');
      const adminName = urlParams.get('admin'); // 支持通过链接直接进入管理员审批
      
      if (adminName) {
        openAdminPanel();
        document.getElementById('admin-name-input').value = adminName;
        loadAdminRequests();
      } else if (deviceId) {
        showDetail(deviceId);
      } else {
        goHome();
      }
    });

    // 3. 回到首页
    function goHome() {
      window.history.replaceState({}, document.title, window.location.pathname);
      document.getElementById('view-home').classList.remove('hidden');
      document.getElementById('view-scanner').classList.add('hidden');
      document.getElementById('view-detail').classList.add('hidden');
      document.getElementById('view-admin').classList.add('hidden');
      stopScanner();
      loadRecentLogs();
      loadTestDevices();
    }

    // 4. 展示详情页
    async function showDetail(deviceId) {
      document.getElementById('view-home').classList.add('hidden');
      document.getElementById('view-scanner').classList.add('hidden');
      document.getElementById('view-admin').classList.add('hidden');
      document.getElementById('view-detail').classList.remove('hidden');
      
      document.getElementById('detail-loading').classList.remove('hidden');
      document.getElementById('detail-content').classList.add('hidden');
      document.getElementById('detail-error').classList.add('hidden');
      
      stopScanner();

      if (!supabaseClient) {
        showErrorState("数据库客户端初始化失败，请刷新重试！");
        return;
      }
      
      try {
        const { data, error } = await supabaseClient
          .from('devices')
          .select('*')
          .eq('device_id', deviceId)
          .single();
          
        if (error) throw new Error(`数据库查询报错: ${error.message}`);
        if (!data) throw new Error(`未找到该设备。\n\n扫码 ID: "${deviceId}"\n请确认该 ID 是否已录入系统！`);
        
        currentDevice = data;
        renderDeviceDetail();
      } catch (err) {
        showErrorState(err.message);
      }
    }

    function showErrorState(msg) {
      document.getElementById('detail-loading').classList.add('hidden');
      document.getElementById('detail-content').classList.add('hidden');
      const errBox = document.getElementById('detail-error');
      errBox.classList.remove('hidden');
      document.getElementById('detail-error-msg').innerText = msg;
    }

    // 5. 渲染设备详情
    function renderDeviceDetail() {
      document.getElementById('detail-loading').classList.add('hidden');
      document.getElementById('detail-content').classList.remove('hidden');

      document.getElementById('device-id-tag').innerText = "ID: " + currentDevice.device_id;
      document.getElementById('device-category').innerText = currentDevice.category;
      document.getElementById('device-name').innerText = currentDevice.name;
      document.getElementById('device-model').innerText = currentDevice.model || "暂无";
      document.getElementById('device-sn').innerText = currentDevice.sn || "暂无";
      document.getElementById('device-owner').innerText = currentDevice.owner || "暂无";
      document.getElementById('device-location').innerText = currentDevice.location || "暂无";

      const statusBadge = document.getElementById('device-status-badge');
      const borrowForm = document.getElementById('action-borrow');
      const returnRequestForm = document.getElementById('action-return-request');
      const pendingConfirmBox = document.getElementById('action-pending-confirm');

      // 核心业务状态分支：
      const currentStatus = currentDevice.status || '库房中';

      if (currentStatus === '待确认归还') {
        // 待确认归还状态
        statusBadge.innerText = "归还待确认";
        statusBadge.className = "absolute top-4 right-4 px-3 py-1 rounded-full text-xs font-bold bg-amber-100 text-amber-700";
        
        borrowForm.classList.add('hidden');
        returnRequestForm.classList.add('hidden');
        pendingConfirmBox.classList.remove('hidden');
        document.getElementById('pending-owner-name').innerText = currentDevice.owner || "暂无";

      } else if (currentDevice.current_borrower) {
        // 已借出状态
        statusBadge.innerText = "已借出";
        statusBadge.className = "absolute top-4 right-4 px-3 py-1 rounded-full text-xs font-bold bg-rose-100 text-rose-700";
        
        borrowForm.classList.add('hidden');
        returnRequestForm.classList.remove('hidden');
        pendingConfirmBox.classList.add('hidden');

        document.getElementById('current-borrower-name').innerText = currentDevice.current_borrower;
        document.getElementById('borrow-time-tag').innerText = new Date(currentDevice.borrow_time).toLocaleString('zh-CN');
      } else {
        // 库房中 (可用)
        statusBadge.innerText = "库房中";
        statusBadge.className = "absolute top-4 right-4 px-3 py-1 rounded-full text-xs font-bold bg-emerald-100 text-emerald-700";
        
        borrowForm.classList.remove('hidden');
        returnRequestForm.classList.add('hidden');
        pendingConfirmBox.classList.add('hidden');
        
        // 🌟 核心体验优化：从本地缓存自动读取上次输入的名字，免去每次输入的麻烦！
        const savedName = localStorage.getItem('vd_user_nickname') || "";
        document.getElementById('borrower-name').value = savedName;
        document.getElementById('expected-return-date').value = "";
      }
    }

    // 6. 提交借出登记
    async function submitBorrow() {
      const borrowerName = document.getElementById('borrower-name').value.trim();
      const expectedReturnDate = document.getElementById('expected-return-date').value;

      if (!borrowerName) {
        alert("请输入你的姓名！");
        return;
      }

      // 🌟 保存名字到本地浏览器缓存中，下次打开自动填好！
      localStorage.setItem('vd_user_nickname', borrowerName);

      const borrowTime = new Date().toISOString();

      try {
        const { error: devError } = await supabaseClient
          .from('devices')
          .update({
            current_borrower: borrowerName,
            borrow_time: borrowTime,
            expected_return_date: expectedReturnDate || null,
            status: '已借出'
          })
          .eq('device_id', currentDevice.device_id);

        if (devError) throw devError;

        await supabaseClient
          .from('borrow_logs')
          .insert({
            device_id: currentDevice.device_id,
            borrower_name: borrowerName,
            action_type: 'borrow',
            expected_return_date: expectedReturnDate || null
          });

        alert(`登记成功！你已成功借出设备。`);
        showDetail(currentDevice.device_id);
      } catch (err) {
        alert("登记失败: " + err.message);
      }
    }

    // 7. 员工提交：申请归还（触发微信推送给管理员）
    async function submitReturnRequest() {
      const borrower = currentDevice.current_borrower;
      
      try {
        // a. 更新设备表状态为“待确认归还”
        const { error: devError } = await supabaseClient
          .from('devices')
          .update({
            status: '待确认归还'
          })
          .eq('device_id', currentDevice.device_id);

        if (devError) throw devError;

        // b. 🚀 微信远程推送逻辑 (如果配置了 admin_push_key)
        if (currentDevice.admin_push_key) {
          const adminUrl = `https://sanshu56.github.io/VD-test-devices/?admin=${encodeURIComponent(currentDevice.owner)}`;
          const title = `🚨 设备归还确认申请`;
          const desp = `### 申请详情\n` +
                       `* **设备名称**：${currentDevice.name}\n` +
                       `* **设备 ID**：${currentDevice.device_id}\n` +
                       `* **借用人员**：${borrower}\n` +
                       `* **保管管理员**：${currentDevice.owner}\n\n` +
                       `[👉 点击此处一键确认归还](${adminUrl})`;

          // 调用 Server酱 免费微信推送接口
          const pushUrl = `https://sctapi.ftqq.com/${currentDevice.admin_push_key}.send`;
          
          // 异步发送，不阻塞页面逻辑
          fetch(pushUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: `title=${encodeURIComponent(title)}&desp=${encodeURIComponent(desp)}`
          }).then(res => console.log('微信推送成功'))
            .catch(err => console.error('微信推送失败', err));
        }

        alert("归还申请提交成功！已通过微信通知管理员确认。");
        showDetail(currentDevice.device_id);
      } catch (err) {
        alert("申请归还失败: " + err.message);
      }
    }

    // ================= 管理员面板逻辑 =================

    function openAdminPanel() {
      document.getElementById('view-home').classList.add('hidden');
      document.getElementById('view-scanner').classList.add('hidden');
      document.getElementById('view-detail').classList.add('hidden');
      document.getElementById('view-admin').classList.remove('hidden');
      stopScanner();
    }

    function exitAdminPanel() {
      goHome();
    }

    // 加载专属我的待处理归还申请
    async function loadAdminRequests() {
      const adminName = document.getElementById('admin-name-input').value.trim();
      const listContainer = document.getElementById('admin-request-list');

      if (!adminName) {
        alert("请输入你的名字！");
        return;
      }

      listContainer.innerHTML = `<p class="text-slate-400 text-center py-8">正在检索属于你的待办...</p>`;

      try {
        const { data, error } = await supabaseClient
          .from('devices')
          .select('*')
          .eq('owner', adminName)
          .eq('status', '待确认归还');

        if (error) throw error;

        if (!data || data.length === 0) {
          listContainer.innerHTML = `<p class="text-slate-400 text-center py-8 text-sm bg-white rounded-2xl border border-slate-100">🎉 暂无待确认的归还申请</p>`;
          return;
        }

        listContainer.innerHTML = data.map(dev => `
          <div class="bg-white rounded-2xl p-4 shadow-sm border border-slate-100 flex justify-between items-center">
            <div class="space-y-1">
              <h4 class="font-bold text-slate-800 text-sm">${dev.name}</h4>
              <p class="text-xs text-slate-400">ID: ${dev.device_id} · 借用人: <strong class="text-slate-600">${dev.current_borrower}</strong></p>
            </div>
            <button onclick="approveReturn('${dev.device_id}', '${dev.current_borrower}')" class="bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-bold px-3 py-2 rounded-lg transition active:scale-95 shadow-sm">
              确认入库
            </button>
          </div>
        `).join('');
      } catch (err) {
        listContainer.innerHTML = `<p class="text-rose-500 text-center py-4 text-xs">加载失败: ${err.message}</p>`;
      }
    }

    // 管理员点击：确认归还入库
    async function approveReturn(deviceId, borrower) {
      if (!confirm(`确认设备 ${deviceId} 已安全入库吗？`)) return;

      try {
        // a. 清空设备表借用信息
        const { error: devError } = await supabaseClient
          .from('devices')
          .update({
            current_borrower: null,
            borrow_time: null,
            expected_return_date: null,
            status: '库房中'
          })
          .eq('device_id', deviceId);

        if (devError) throw devError;

        // b. 插入归还日志
        await supabaseClient
          .from('borrow_logs')
          .insert({
            device_id: deviceId,
            borrower_name: borrower,
            action_type: 'return'
          });

        alert("设备入库成功！");
        loadAdminRequests(); // 刷新列表
      } catch (err) {
        alert("确认入库失败: " + err.message);
      }
    }

    // ================= 辅助/扫码逻辑 =================

    async function loadRecentLogs() {
      const container = document.getElementById('recent-logs');
      if (!supabaseClient) return;
      try {
        const { data, error } = await supabaseClient
          .from('borrow_logs')
          .select('*, devices(name)')
          .order('action_time', { ascending: false })
          .limit(5);
        if (error) throw error;
        if (!data || data.length === 0) {
          container.innerHTML = `<p class="text-slate-400 text-center py-4">暂无借还记录</p>`;
          return;
        }
        container.innerHTML = data.map(log => {
          const timeStr = new Date(log.action_time).toLocaleDateString('zh-CN') + ' ' + new Date(log.action_time).toLocaleTimeString('zh-CN', {hour: '2-digit', minute:'2-digit'});
          const isBorrow = log.action_type === 'borrow';
          const badgeColor = isBorrow ? 'bg-emerald-50 text-emerald-700 border-emerald-100' : 'bg-blue-50 text-blue-700 border-blue-100';
          const actionText = isBorrow ? '借出' : '归还';
          const deviceName = log.devices ? log.devices.name : log.device_id;

          return `
            <div class="flex items-start justify-between p-3 bg-slate-50 rounded-xl border border-slate-100">
              <div class="space-y-1">
                <p class="font-bold text-slate-700">${deviceName}</p>
                <p class="text-xs text-slate-400">${timeStr} · ID: ${log.device_id}</p>
              </div>
              <div class="flex flex-col items-end gap-1.5">
                <span class="px-2 py-0.5 text-xs font-bold border rounded-full ${badgeColor}">${log.borrower_name} ${actionText}</span>
              </div>
            </div>
          `;
        }).join('');
      } catch (err) {
        container.innerHTML = `<p class="text-rose-500 text-center py-2">加载动态失败: ${err.message}</p>`;
      }
    }

    async function loadTestDevices() {
      const container = document.getElementById('test-devices-list');
      if (!supabaseClient) return;
      try {
        const { data, error } = await supabaseClient
          .from('devices')
          .select('device_id, name')
          .limit(3);
        if (error) throw error;
        if (data && data.length > 0) {
          document.getElementById('test-devices-section').classList.remove('hidden');
          container.innerHTML = data.map(dev => `
            <button onclick="showDetail('${dev.device_id}')" class="bg-blue-50 hover:bg-blue-100 text-blue-700 text-xs font-bold py-2 px-3 rounded-lg border border-blue-100 transition shadow-sm">
              🔍 ${dev.name}
            </button>
          `).join('');
        }
      } catch (err) {
        console.error("加载快捷测试设备失败: ", err);
      }
    }

    function startScanner() {
      document.getElementById('view-home').classList.add('hidden');
      document.getElementById('view-scanner').classList.remove('hidden');
      html5QrScanner = new Html5Qrcode("interactive-scanner");
      const config = { 
        fps: 10, 
        qrbox: (width, height) => {
          const size = Math.min(width, height) * 0.7;
          return { width: size, height: size };
        }
      };
      html5QrScanner.start(
        { facingMode: "environment" },
        config,
        (decodedText) => {
          try {
            if (decodedText.startsWith('http')) {
              const url = new URL(decodedText);
              const id = url.searchParams.get('id');
              if (id) {
                showDetail(id);
                return;
              }
            }
          } catch(e) {}
          showDetail(decodedText.trim());
        },
        (errorMessage) => {}
      ).catch(err => {
        showErrorState("无法开启摄像头，请确认是否授予网页相机权限！");
        goHome();
      });
    }

    function stopScanner() {
      if (html5QrScanner) {
        html5QrScanner.stop().then(() => {
          html5QrScanner = null;
        }).catch(err => console.error("停止扫码失败", err));
      }
    }

    function searchManualId() {
      const id = document.getElementById('manual-id-input').value.trim();
      if (!id) {
        showErrorState("请输入设备 ID！");
        return;
      }
      showDetail(id);
    }
  </script>
</body>
</html>
